name: "Biloba Kernel 5.10.257 Port"

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Hedef Linux Stable Surum'
        required: true
        default: '5.10.257'
      toolchain:
        description: 'Derleme Araci'
        required: true
        default: 'clang'
        type: choice
        options:
          - clang
          - gcc
      build_target:
        description: 'Build Hedefi'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - dtbs-only

env:
  BILOBA_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  BILOBA_BRANCH: biloba-r-oss
  LINUX_STABLE_REPO: https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
  ARCH: arm64
  SUBARCH: arm64
  KBUILD_BUILD_USER: github-actions
  KBUILD_BUILD_HOST: biloba-port-ci
  KBUILD_BUILD_TIMESTAMP: ""

jobs:
  extract-device-files:
    name: "1. Cihaz Dosyalarini Cikar"
    runs-on: ubuntu-22.04
    outputs:
      device-files-tar: ${{ steps.upload-device.outputs.artifact-id }}
    steps:
      - name: "Depolari Yukle"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git bc bison build-essential ccache \
            curl flex libssl-dev libncurses-dev python3 wget xz-utils

      - name: "Biloba-r-oss Checkout"
        run: |
          git clone --depth=1 --branch ${{ env.BILOBA_BRANCH }} \
            ${{ env.BILOBA_REPO }} ${{ github.workspace }}/biloba-oss
          echo "BILOBA_PATH=${{ github.workspace }}/biloba-oss" >> $GITHUB_ENV

      - name: "Cihaza Ozel Dosyalari Cikar"
        run: |
          mkdir -p ${{ github.workspace }}/device-files
          bash ${{ github.workspace }}/scripts/01-extract-device-files.sh \
            ${{ github.workspace }}/biloba-oss \
            ${{ github.workspace }}/device-files

      - name: "Dosya Manifesti Olustur"
        run: |
          echo "=== Cikarilan Dosyalar ===" > ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "Tarih: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "Kaynak: ${{ env.BILOBA_REPO }}@${{ env.BILOBA_BRANCH }}" >> ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "Commit: $(cd ${{ github.workspace }}/biloba-oss && git rev-parse --short HEAD)" >> ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "" >> ${{ github.workspace }}/device-files/MANIFEST.txt
          find ${{ github.workspace }}/device-files -type f | sort >> ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "Toplam: $(find ${{ github.workspace }}/device-files -type f | wc -l) dosya"

      - name: "Device Files Artifact Upload"
        id: upload-device
        uses: actions/upload-artifact@v4
        with:
          name: biloba-device-files
          path: ${{ github.workspace }}/device-files/
          retention-days: 7

  port-and-build:
    name: "2. Port Et ve Derle (${{ inputs.toolchain }})"
    runs-on: ubuntu-22.04
    needs: extract-device-files
    timeout-minutes: 240
    steps:
      - name: "Build Alanini Genislet"
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 6144
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: "Bagimliliklari Yukle"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex git \
            libssl-dev libncurses-dev libtinfo5 python3 python3-pip \
            wget xz-utils zip unzip device-tree-compiler \
            llvm lld libclang-dev clang libelf-dev

      - name: "Toolchain Kurulumu"
        run: |
          if [ "${{ inputs.toolchain }}" = "gcc" ]; then
            sudo apt-get install -y -qq gcc-aarch64-linux-gnu
            echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
            echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "TOOLCHAIN_NAME=gcc" >> $GITHUB_ENV
          else
            # Android Clang 17.0.0 (r487747c) - Kernel 5.10 uyumlu
            CLANG_VERSION="r487747c"
            CLANG_TAR="clang-${CLANG_VERSION}.tar.xz"
            mkdir -p ${{ github.workspace }}/toolchain
            cd ${{ github.workspace }}/toolchain
            
            # Google Android clang mirror
            wget -q --show-progress \
              "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_TAR}" \
              -O ${CLANG_TAR} || \
            wget -q --show-progress \
              "https://github.com/nibaji/android_prebuilts_clang_host_linux-x86_clang-${CLANG_VERSION}/archive/refs/heads/main.tar.gz" \
              -O clang.tar.gz
            
            if [ -f ${CLANG_TAR} ]; then
              tar -xf ${CLANG_TAR}
            elif [ -f clang.tar.gz ]; then
              tar -xzf clang.tar.gz
              mv android_prebuilts_clang_host_linux-x86_clang-${CLANG_VERSION}-main clang-${CLANG_VERSION}
            fi
            
            CLANG_BIN=$(find ${{ github.workspace }}/toolchain -name "clang" -type f | head -1 | xargs dirname)
            echo "PATH=${CLANG_BIN}:${PATH}" >> $GITHUB_ENV
            echo "CC=clang" >> $GITHUB_ENV
            echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
            echo "AR=llvm-ar" >> $GITHUB_ENV
            echo "NM=llvm-nm" >> $GITHUB_ENV
            echo "OBJCOPY=llvm-objcopy" >> $GITHUB_ENV
            echo "OBJDUMP=llvm-objdump" >> $GITHUB_ENV
            echo "STRIP=llvm-strip" >> $GITHUB_ENV
            echo "LD=ld.lld" >> $GITHUB_ENV
            echo "TOOLCHAIN_NAME=clang-${CLANG_VERSION}" >> $GITHUB_ENV
          fi

      - name: "ccache Cache"
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ inputs.toolchain }}-${{ inputs.kernel_version }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ inputs.toolchain }}-${{ inputs.kernel_version }}-

      - name: "Repo Checkout (Workflow Dosyalari)"
        uses: actions/checkout@v4
        with:
          path: ci-repo
          sparse-checkout: |
            scripts/
            configs/
            patches/
          sparse-checkout-cone-mode: false

      - name: "Linux 5.10.257 Stable Indir"
        run: |
          bash ${{ github.workspace }}/ci-repo/scripts/02-setup-linux-510.sh \
            "${{ inputs.kernel_version }}" \
            "${{ github.workspace }}/linux-stable"

      - name: "Cihaz Dosyalarini Indir"
        uses: actions/download-artifact@v4
        with:
          name: biloba-device-files
          path: ${{ github.workspace }}/device-files/

      - name: "Dosyalari 5.10'e Entegre Et"
        run: |
          bash ${{ github.workspace }}/ci-repo/scripts/03-integrate-files.sh \
            ${{ github.workspace }}/device-files \
            ${{ github.workspace }}/linux-stable

      - name: "Uyumluluk Patch'leri Uygula"
        run: |
          bash ${{ github.workspace }}/ci-repo/scripts/04-apply-patches.sh \
            ${{ github.workspace }}/linux-stable \
            ${{ github.workspace }}/ci-repo/patches

      - name: "Defconfig Uygula"
        run: |
          cd ${{ github.workspace }}/linux-stable
          cp ${{ github.workspace }}/ci-repo/configs/biloba_5.10_defconfig \
            arch/arm64/configs/biloba_defconfig
          make O=out ARCH=arm64 biloba_defconfig

      - name: "Kernel Derle"
        id: build
        run: |
          cd ${{ github.workspace }}/linux-stable
          if [ "${{ inputs.build_target }}" = "dtbs-only" ]; then
            make O=out ARCH=arm64 CC="${{ env.CC }}" CROSS_COMPILE="${{ env.CROSS_COMPILE }}" \
              dtbs -j$(nproc --all) 2>&1 | tee ${{ github.workspace }}/build.log
          else
            make O=out ARCH=arm64 CC="${{ env.CC }}" CROSS_COMPILE="${{ env.CROSS_COMPILE }}" \
              -j$(nproc --all) 2>&1 | tee ${{ github.workspace }}/build.log
          fi
        continue-on-error: true
        
      - name: "Build Analizi (Hata Varsa)"
        if: steps.build.outcome == 'failure'
        run: |
          echo "### BUILD HATASI" >> $GITHUB_STEP_SUMMARY
          echo "Derleme sirasinda hata olustu. Son 100 satir:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 ${{ github.workspace }}/build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Devam eden workflow'lar icin artifact'lar yuklenecek."

        - name: "Artifact'lari Paketle"
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          cd ${{ github.workspace }}/linux-stable/out/arch/arm64/boot
          
          # Kernel Image
          [ -f Image ] && cp Image ${{ github.workspace }}/artifacts/ 2>/dev/null
          [ -f Image.gz ] && cp Image.gz ${{ github.workspace }}/artifacts/ 2>/dev/null
          
          # DTB dosyalari
          if [ -d dts/mediatek ]; then
            find dts/mediatek -name "*.dtb" -exec cp {} ${{ github.workspace }}/artifacts/ \; 2>/dev/null
          fi
          
          # Build log
          cp ${{ github.workspace }}/build.log ${{ github.workspace }}/artifacts/ 2>/dev/null
          
          # Build info
          cat << 'EOF' > ${{ github.workspace }}/artifacts/BUILD_INFO.txt
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          KERNEL_VERSION=${{ inputs.kernel_version }}
          TOOLCHAIN=${{ env.TOOLCHAIN_NAME }}
          BILOBA_COMMIT=$(cat ${{ github.workspace }}/device-files/MANIFEST.txt | grep "Commit:" | cut -d' ' -f2)
          BUILD_STATUS=${{ steps.build.outcome }}
          EOF
          
          echo "=== Artifact Icerigi ==="
          ls -lah ${{ github.workspace }}/artifacts/

      - name: "Artifact Upload"
        uses: actions/upload-artifact@v4
        with:
          name: biloba-kernel-510-${{ inputs.toolchain }}-${{ github.run_number }}
          path: ${{ github.workspace }}/artifacts/
          retention-days: 14

      - name: "Build Ozeti"
        run: |
          echo "### Biloba Kernel 5.10.257 Port Ozeti" >> $GITHUB_STEP_SUMMARY
          echo "- **Durum:** ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Surum:** ${{ inputs.kernel_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Toolchain:** ${{ env.TOOLCHAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Hedef:** ${{ inputs.build_target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tarih:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "${{ github.workspace }}/artifacts/Image.gz" ]; then
            echo "- **Image.gz:** ✅ $(ls -lh ${{ github.workspace }}/artifacts/Image.gz | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Image.gz:** ❌ Bulunamadi" >> $GITHUB_STEP_SUMMARY
          fi
          
          DTB_COUNT=$(find ${{ github.workspace }}/artifacts -name "*.dtb" | wc -l)
          echo "- **DTB sayisi:** ${DTB_COUNT}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**⚠️ Derleme hatasi var. Asagidaki adimlar manuel mudahale gerektirebilir:**" >> $GITHUB_STEP_SUMMARY
            echo "1. build.log'u indirip hata mesajini inceleyin" >> $GITHUB_STEP_SUMMARY
            echo "2. patches/ dizinine ilgili uyumluluk patch'ini ekleyin" >> $GITHUB_STEP_SUMMARY
            echo "3. Workflow'u tekrar calistirin" >> $GITHUB_STEP_SUMMARY
          fi
