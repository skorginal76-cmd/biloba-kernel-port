name: "Biloba Kernel 5.10.257 Port"

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Hedef Linux Stable Surum'
        required: true
        default: '5.10.257'
      toolchain:
        description: 'Derleme Araci'
        required: true
        default: 'clang'
        type: choice
        options:
          - clang
          - gcc
      build_target:
        description: 'Build Hedefi'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - dtbs-only

env:
  BILOBA_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  BILOBA_BRANCH: biloba-r-oss
  LINUX_STABLE_REPO: https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
  ARCH: arm64
  SUBARCH: arm64
  KBUILD_BUILD_USER: github-actions
  KBUILD_BUILD_HOST: biloba-port-ci
  KBUILD_BUILD_TIMESTAMP: ""

jobs:
  extract-device-files:
    name: "1. Cihaz Dosyalarini Cikar"
    runs-on: ubuntu-22.04
    outputs:
      device-files-tar: ${{ steps.upload-device.outputs.artifact-id }}
    steps:
      - name: "Disk Alani Temizle"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/share/chromedriver-linux64
          sudo rm -rf /opt/google/chrome /opt/microsoft/msedge /opt/firefox
          sudo rm -rf /usr/local/julia* /usr/local/graalvm /usr/local/n /usr/local/heroku
          sudo rm -rf /usr/local/share/powershell /usr/share/miniconda /usr/share/kotlinc
          sudo docker image prune --all --force 2>/dev/null || true
          sudo docker system prune --all --force 2>/dev/null || true
          sudo apt-get clean
          sudo apt-get autoremove -y
          df -h

      - name: "Depolari Yukle"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git bc bison build-essential ccache \
            curl flex libssl-dev libncurses-dev python3 wget xz-utils

      - name: "Repo Checkout (Workflow Dosyalari)"
        uses: actions/checkout@v4

      - name: "Biloba-r-oss Checkout"
        run: |
          git clone --depth=1 --branch ${{ env.BILOBA_BRANCH }} \
            ${{ env.BILOBA_REPO }} ${{ github.workspace }}/biloba-oss
          echo "BILOBA_PATH=${{ github.workspace }}/biloba-oss" >> $GITHUB_ENV

      - name: "Cihaza Ozel Dosyalari Cikar"
        run: |
          mkdir -p ${{ github.workspace }}/device-files
          bash ${{ github.workspace }}/scripts/01-extract-device-files.sh \
            ${{ github.workspace }}/biloba-oss \
            ${{ github.workspace }}/device-files

      - name: "Dosya Manifesti Olustur"
        run: |
          echo "=== Cikarilan Dosyalar ===" > ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "Tarih: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "Kaynak: ${{ env.BILOBA_REPO }}@${{ env.BILOBA_BRANCH }}" >> ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "Commit: $(cd ${{ github.workspace }}/biloba-oss && git rev-parse --short HEAD)" >> ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "" >> ${{ github.workspace }}/device-files/MANIFEST.txt
          find ${{ github.workspace }}/device-files -type f | sort >> ${{ github.workspace }}/device-files/MANIFEST.txt
          echo "Toplam: $(find ${{ github.workspace }}/device-files -type f | wc -l) dosya"

      - name: "Device Files Artifact Upload"
        id: upload-device
        uses: actions/upload-artifact@v4
        with:
          name: biloba-device-files
          path: ${{ github.workspace }}/device-files/
          retention-days: 7

  port-and-build:
    name: "2. Port Et ve Derle (${{ inputs.toolchain }})"
    runs-on: ubuntu-22.04
    needs: extract-device-files
    timeout-minutes: 240
    steps:
      - name: "Disk Alani Temizle"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/share/chromedriver-linux64
          sudo rm -rf /opt/google/chrome /opt/microsoft/msedge /opt/firefox
          sudo rm -rf /usr/local/julia* /usr/local/graalvm /usr/local/n /usr/local/heroku
          sudo rm -rf /usr/local/share/powershell /usr/share/miniconda /usr/share/kotlinc
          sudo docker image prune --all --force 2>/dev/null || true
          sudo docker system prune --all --force 2>/dev/null || true
          sudo apt-get clean
          sudo apt-get autoremove -y
          df -h

      - name: "Bagimliliklari Yukle"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex git \
            libssl-dev libncurses-dev libtinfo-dev python3 python3-pip \
            wget xz-utils zip unzip device-tree-compiler \
            llvm lld libclang-dev clang libelf-dev

      - name: "Toolchain Kurulumu"
        run: |
          if [ "${{ inputs.toolchain }}" = "gcc" ]; then
            sudo apt-get install -y -qq gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
            echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "TOOLCHAIN_NAME=gcc" >> $GITHUB_ENV
          else
            mkdir -p ${{ github.workspace }}/toolchain/clang
            cd ${{ github.workspace }}/toolchain

            echo "AOSP Clang (r487747c) indiriliyor..."
            if wget -qO clang.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r487747c.tar.gz"; then
              echo "AOSP Clang basariyla indirildi, cikariliyor..."
              tar -xzf clang.tar.gz -C clang/
              echo "TOOLCHAIN_NAME=clang-r487747c" >> $GITHUB_ENV
            else
              echo "Yedek Proton Clang klonlaniliyor..."
              git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
              echo "TOOLCHAIN_NAME=proton-clang" >> $GITHUB_ENV
            fi

            CLANG_BIN="${{ github.workspace }}/toolchain/clang/bin"
            echo "PATH=${CLANG_BIN}:${PATH}" >> $GITHUB_ENV
            echo "CC=clang" >> $GITHUB_ENV
            echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
            echo "AR=llvm-ar" >> $GITHUB_ENV
            echo "NM=llvm-nm" >> $GITHUB_ENV
            echo "OBJCOPY=llvm-objcopy" >> $GITHUB_ENV
            echo "OBJDUMP=llvm-objdump" >> $GITHUB_ENV
            echo "STRIP=llvm-strip" >> $GITHUB_ENV
            echo "LD=ld.lld" >> $GITHUB_ENV
          fi

      - name: "ccache Cache"
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ inputs.toolchain }}-${{ inputs.kernel_version }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ inputs.toolchain }}-${{ inputs.kernel_version }}-

      - name: "Repo Checkout (Workflow Dosyalari)"
        uses: actions/checkout@v4
        with:
          path: ci-repo
          sparse-checkout: |
            scripts/
            configs/
            patches/
          sparse-checkout-cone-mode: false

      - name: "Linux 5.10.257 Stable Indir"
        run: |
          rm -rf ${{ github.workspace }}/linux-stable
          bash ${{ github.workspace }}/ci-repo/scripts/02-setup-linux-510.sh \
            "${{ inputs.kernel_version }}" \
            "${{ github.workspace }}/linux-stable"

      - name: "Kaynak Agacini Temizle"
        run: |
          cd ${{ github.workspace }}/linux-stable
          make ARCH=arm64 mrproper

      - name: "Cihaz Dosyalarini Indir"
        uses: actions/download-artifact@v4
        with:
          name: biloba-device-files
          path: ${{ github.workspace }}/device-files/

      - name: "Dosyalari 5.10'e Entegre Et"
        run: |
          bash ${{ github.workspace }}/ci-repo/scripts/03-integrate-files.sh \
            ${{ github.workspace }}/device-files \
            ${{ github.workspace }}/linux-stable

      - name: "Kconfig 5.10 Syntax Fix"
        run: |
          cd ${{ github.workspace }}/linux-stable
          echo "=== Kconfig Syntax Duzeltme ==="

          # 1. Tum ---help--- -> help
          find drivers/misc/mediatek drivers/input/touchscreen -name "Kconfig" -type f -exec \
            perl -pi -e 's/^([\t ]*)---help---([\t ]*)$/\1help\2/' {} + 2>/dev/null || true

          # 2. Eksik touchscreen Kconfig
          mkdir -p drivers/input/touchscreen/mediatek
          cat > drivers/input/touchscreen/mediatek/Kconfig << 'KCONFIG_EOF'
# Mediatek Touchscreen Kconfig placeholder
    config TOUCHSCREEN_MTK
	tristate "MediaTek Touchscreen"
	depends on INPUT_TOUCHSCREEN
	help
	  Say Y here to enable MediaTek touchscreen support.
KCONFIG_EOF

          # 3. Touchscreen Kconfig'e include ekle
          if ! grep -q "mediatek/Kconfig" drivers/input/touchscreen/Kconfig 2>/dev/null; then
            echo 'source "drivers/input/touchscreen/mediatek/Kconfig"' >> drivers/input/touchscreen/Kconfig
          fi

          # 4. irrx: choose -> choice
          if [ -f "drivers/misc/mediatek/irrx/Kconfig" ]; then
            sed -i 's/^choose$/choice/' drivers/misc/mediatek/irrx/Kconfig 2>/dev/null || true
          fi

          # 5. Eksik newline'lari ekle
          find drivers/misc/mediatek drivers/input/touchscreen -name "Kconfig" -type f | while read -r kf; do
            [ -n "$(tail -c 1 "$kf")" ] && echo "" >> "$kf"
          done

          # 6. Duplicate prompt fix (usb20)
          if [ -f "drivers/misc/mediatek/usb20/Kconfig" ]; then
            awk '
              /config USB_MTK_HDRC/ { in_block=1; print; next }
              /^config / && in_block { in_block=0 }
              in_block && /^[\t ]*prompt[\t ]+"/ { 
                if (!prompt_seen) { prompt_seen=1; print; next }
                else { next }
              }
              { print }
            ' drivers/misc/mediatek/usb20/Kconfig > /tmp/usb20_kconfig_fixed
            mv /tmp/usb20_kconfig_fixed drivers/misc/mediatek/usb20/Kconfig
          fi

          echo "=== Kconfig Duzeltme Tamamlandi ==="

      - name: "Uyumluluk Patch'leri Uygula"
        run: |
          bash ${{ github.workspace }}/ci-repo/scripts/04-apply-patches.sh \
            ${{ github.workspace }}/linux-stable \
            ${{ github.workspace }}/ci-repo/patches

      - name: "Defconfig Uygula"
        run: |
          cd ${{ github.workspace }}/linux-stable

          # Temiz 5.10 defconfig olustur
          make ARCH=arm64 defconfig

          # Biloba config'ini merge et
          if [ -f "${{ github.workspace }}/ci-repo/configs/biloba_5.10_defconfig" ]; then
            grep -E '^(CONFIG_|# CONFIG_)' \
              "${{ github.workspace }}/ci-repo/configs/biloba_5.10_defconfig" \
              | sort -u > /tmp/biloba_clean.config

            ./scripts/kconfig/merge_config.sh -m .config /tmp/biloba_clean.config || true
          fi

          make ARCH=arm64 olddefconfig

          echo "=== Defconfig Ozeti ==="
          grep -E "CONFIG_ARCH_MEDIATEK|CONFIG_LOCALVERSION|CONFIG_MTK_|CONFIG_ANDROID" .config | head -20

      - name: "Kernel Derle"
        id: build
        run: |
          cd ${{ github.workspace }}/linux-stable
          if [ "${{ inputs.build_target }}" = "dtbs-only" ]; then
            make O=out ARCH=arm64 CC="${{ env.CC }}" CROSS_COMPILE="${{ env.CROSS_COMPILE }}" \
              dtbs -j$(nproc --all) 2>&1 | tee ${{ github.workspace }}/build.log
          else
            make O=out ARCH=arm64 CC="${{ env.CC }}" CROSS_COMPILE="${{ env.CROSS_COMPILE }}" \
              -j$(nproc --all) 2>&1 | tee ${{ github.workspace }}/build.log
          fi
        continue-on-error: true

      - name: "Build Analizi (Hata Varsa)"
        if: steps.build.outcome == 'failure'
        run: |
          echo "### BUILD HATASI" >> $GITHUB_STEP_SUMMARY
          echo "Derleme sirasinda hata olustu. Son 100 satir:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 ${{ github.workspace }}/build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "Artifact'lari Paketle"
        run: |
          mkdir -p ${{ github.workspace }}/artifacts

          if [ -d "${{ github.workspace }}/linux-stable/out/arch/arm64/boot" ]; then
            cd ${{ github.workspace }}/linux-stable/out/arch/arm64/boot
            [ -f Image ] && cp Image ${{ github.workspace }}/artifacts/
            [ -f Image.gz ] && cp Image.gz ${{ github.workspace }}/artifacts/

            if [ -d dts/mediatek ]; then
              find dts/mediatek -name "*.dtb" -exec cp {} ${{ github.workspace }}/artifacts/ \\;
            fi
          fi

          cp ${{ github.workspace }}/build.log ${{ github.workspace }}/artifacts/

          printf '%s\n' \
            "BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            "KERNEL_VERSION=${{ inputs.kernel_version }}" \
            "TOOLCHAIN=${{ env.TOOLCHAIN_NAME }}" \
            "BILOBA_COMMIT=$(grep 'Commit:' ${{ github.workspace }}/device-files/MANIFEST.txt 2>/dev/null | cut -d' ' -f2 || echo 'unknown')" \
            "BUILD_STATUS=${{ steps.build.outcome }}" \
            > ${{ github.workspace }}/artifacts/build-info.txt

          echo "=== Artifact Icerigi ==="
          ls -lah ${{ github.workspace }}/artifacts/

      - name: "Artifact Upload"
        uses: actions/upload-artifact@v4
        with:
          name: biloba-kernel-510-${{ inputs.toolchain }}-${{ github.run_number }}
          path: ${{ github.workspace }}/artifacts/
          retention-days: 14

      - name: "Build Ozeti"
        run: |
          echo "### Biloba Kernel 5.10.257 Port Ozeti" >> $GITHUB_STEP_SUMMARY
          echo "- **Durum:** ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Surum:** ${{ inputs.kernel_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Toolchain:** ${{ env.TOOLCHAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Hedef:** ${{ inputs.build_target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tarih:** $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

          if [ -f "${{ github.workspace }}/artifacts/Image.gz" ]; then
            echo "- **Image.gz:** ✅ $(ls -lh ${{ github.workspace }}/artifacts/Image.gz | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Image.gz:** ❌ Bulunamadi" >> $GITHUB_STEP_SUMMARY
          fi

          DTB_COUNT=$(find ${{ github.workspace }}/artifacts -name "*.dtb" | wc -l)
          echo "- **DTB sayisi:** ${DTB_COUNT}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**⚠️ Derleme hatasi var.**" >> $GITHUB_STEP_SUMMARY
            echo "1. build.log'u indirip hata mesajini inceleyin" >> $GITHUB_STEP_SUMMARY
            echo "2. patches/ dizinine ilgili uyumluluk patch'ini ekleyin" >> $GITHUB_STEP_SUMMARY
            echo "3. Workflow'u tekrar calistirin" >> $GITHUB_STEP_SUMMARY
          fi
